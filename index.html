<!DOCTYPE html>
<html>
<head>
https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js
</head>
<body>

<h1>Tesseract Test</h1>

<div id="result"></div>

<script>

if(typeof Tesseract === "undefined"){
    document.getElementById("result").innerHTML =
        "❌ Tesseract NOT Loaded";
}
else{
    document.getElementById("result").innerHTML =
        "✅ Tesseract Loaded";
}

</script>

</body>
</html>
