<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>DR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  font-family:Arial;
  padding:40px;
}

#dropZone{
  height:250px;
  border:3px dashed #0078d7;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:20px;
}

#status{
  margin-top:20px;
}

</style>

</head>

<body>

<h2>DR PDF Processor</h2>

<div id="dropZone">
  Drag One or More PDFs Here
</div>

<div id="status"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById("dropZone");
const status = document.getElementById("status");

dropZone.addEventListener("dragover", function(e){
  e.preventDefault();
});

dropZone.addEventListener("drop", async function(e){

  e.preventDefault();

  const files = e.dataTransfer.files;

  if(files.length === 0){
    return;
  }

  status.innerHTML =
    "<b>Processing " + files.length + " file(s)...</b><br><br>";

  for(const file of files){

    await processPDF(file);

  }

});

async function processPDF(file){

  try{

    const buffer = await file.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({
      data: buffer
    }).promise;

    let text = "";

    for(let page=1; page<=pdf.numPages; page++){

      const currentPage =
        await pdf.getPage(page);

      const content =
        await currentPage.getTextContent();

      text += content.items
        .map(item => item.str)
        .join(" ");

    }

    const match =
      text.match(/DR\s*No\.?\s*:?\s*(\d+)/i);

    if(!match){

      status.innerHTML +=
        "❌ " + file.name +
        " - DR Number Not Found<br>";

      return;
    }

    const drNo = match[1];

    const blob =
      new Blob([buffer],
      {type:'application/pdf'});

    const link =
      document.createElement("a");

    link.href =
      URL.createObjectURL(blob);

    link.download =
      drNo + ".pdf";

    link.click();

    status.innerHTML +=
      "✅ " +
      file.name +
      " → " +
      drNo +
      ".pdf<br>";

  }
  catch(err){

    status.innerHTML +=
      "❌ " +
      file.name +
      " → " +
      err.message +
      "<br>";

  }

}

</script>

</body>
</html>
