<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DR OCR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}

h2 {
    text-align: center;
}

#dropZone {
    height: 260px;
    border: 3px dashed #0078d7;
    border-radius: 12px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
}

#dropZone.dragover {
    background: #e8f3ff;
}

#status {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    white-space: pre-wrap;
    font-family: Consolas, monospace;
    font-size: 14px;
}

.success {
    color: green;
}

.error {
    color: red;
}
</style>
</head>

<body>

<h2>DR OCR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">Waiting for PDF...</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

window.onload = function () {
    statusDiv.innerHTML =
        "PDF.js: " + typeof pdfjsLib +
        "\nTesseract: " + typeof Tesseract +
        "\n\nWaiting for PDF...";
};

dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function() {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async function(e) {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if (files.length === 0) {
        return;
    }

    statusDiv.innerHTML =
        "PDF.js: " + typeof pdfjsLib +
        "\nTesseract: " + typeof Tesseract +
        "\n\nProcessing " + files.length + " file(s)...\n";

    for (const file of files) {
        if (file.type !== "application/pdf") {
            statusDiv.innerHTML += "\n❌ Not a PDF: " + file.name;
            continue;
        }

        await processPDF(file);
    }
});

async function processPDF(file) {
    try {
        statusDiv.innerHTML += "\n\n📄 Processing: " + file.name;

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let fullText = "";

        for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++) {
            statusDiv.innerHTML += "\n🔍 OCR Page " + pageNo + " of " + pdf.numPages;

            const page = await pdf.getPage(pageNo);

            const viewport = page.getViewport({
                scale: 2.5
            });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: context,
                viewport: viewport
            }).promise;

            const result = await Tesseract.recognize(
                canvas,
                "eng",
                {
                    logger: function(m) {
                        if (m.status === "recognizing text") {
                            const percent = Math.round(m.progress * 100);
                            console.log("OCR Page " + pageNo + ": " + percent + "%");
                        }
                    }
                }
            );

            fullText += "\n" + result.data.text;
        }

        console.log("===== OCR TEXT =====");
        console.log(fullText);

        const drNumber = extractDRNumber(fullText);

        if (!drNumber) {
            statusDiv.innerHTML += "\n❌ DR Number Not Found: " + file.name;
            statusDiv.innerHTML += "\n\n===== OCR TEXT PREVIEW =====\n";
            statusDiv.innerHTML += fullText.substring(0, 3000);
            return;
        }

        downloadRenamedPDF(buffer, drNumber + ".pdf");

        statusDiv.innerHTML +=
            "\n✅ " + file.name + " → " + drNumber + ".pdf";

    } catch (error) {
        console.error(error);

        statusDiv.innerHTML +=
            "\n❌ Error processing " + file.name + ": " + error.message;
    }
}

function extractDRNumber(text) {
    const cleanText = text.replace(/\s+/g, " ");

    let match = cleanText.match(/D\s*R\s*(?:No|NO|N0|Number|#)?[\s.:#-]{0,10}([0-9][0-9\s-]{7,20})/i);

    if (match) {
        const digits = match[1].replace(/\D/g, "");

        if (digits.length >= 8) {
            return digits;
        }
    }

    match = cleanText.match(/DR[\s\S]{0,80}?([0-9][0-9\s-]{7,20})/i);

    if (match) {
        const digits = match[1].replace(/\D/g, "");

        if (digits.length >= 8) {
            return digits;
        }
    }

    const possibleNumbers = cleanText.match(/[0-9][0-9\s-]{7,20}[0-9]/g);

    if (possibleNumbers) {
        const cleanedNumbers = possibleNumbers
            .map(n => n.replace(/\D/g, ""))
            .filter(n => n.length >= 8);

        const startsWith500 = cleanedNumbers.find(n => n.startsWith("500"));

        if (startsWith500) {
            return startsWith500;
        }

        if (cleanedNumbers.length > 0) {
            return cleanedNumbers[0];
        }
    }

    return null;
}

function downloadRenamedPDF(buffer, fileName) {
    const blob = new Blob(
        [buffer],
        {
            type: "application/pdf"
        }
    );

    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
