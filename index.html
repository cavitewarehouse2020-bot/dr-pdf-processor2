<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DR PDF Processor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:30px;
}

h2{
    text-align:center;
}

#dropZone{
    height:250px;
    border:3px dashed #0078d7;
    border-radius:12px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

#dropZone.dragover{
    background:#e8f3ff;
}

#status{
    margin-top:20px;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<h2>DR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">
    Waiting for PDFs...
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

dropZone.addEventListener("dragover", (e)=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async (e)=>{

    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if(files.length === 0){
        return;
    }

    statusDiv.innerHTML =
    "<b>Processing " + files.length + " PDF(s)...</b><br><br>";

    for(const file of files){

        if(file.type !== "application/pdf"){

            statusDiv.innerHTML +=
            "<div class='error'>❌ Not a PDF: "
            + file.name +
            "</div>";

            continue;
        }

        await processPDF(file);
    }
});

async function processPDF(file){

    try{

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let fullText = "";

        for(let page = 1; page <= pdf.numPages; page++){

            const currentPage =
                await pdf.getPage(page);

            const content =
                await currentPage.getTextContent();

            fullText += content.items
                .map(item => item.str)
                .join(" ");

            fullText += "\n";
        }

        console.log(fullText);

        const match =
        fullText.match(/DR\s*No\.?\s*[:\-]?\s*(\d+)/i);

        if(!match){

            statusDiv.innerHTML +=
            "<div class='error'>❌ DR Number Not Found: "
            + file.name +
            "</div>";

            return;
        }

        const drNumber = match[1];

        const blob = new Blob(
            [buffer],
            {type:"application/pdf"}
        );

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;
        a.download = drNumber + ".pdf";

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        URL.revokeObjectURL(url);

        statusDiv.innerHTML +=
        "<div class='success'>✅ "
        + file.name +
        " → "
        + drNumber +
        ".pdf</div>";

    }
    catch(error){

        statusDiv.innerHTML +=
        "<div class='error'>❌ "
        + file.name +
        " → "
        + error.message +
        "</div>";

        console.error(error);
    }
}

</script>

</body>
</html>
