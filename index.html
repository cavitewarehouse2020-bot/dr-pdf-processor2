<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
    background:#f5f5f5;
}

h2{
    text-align:center;
}

#dropZone{
    height:250px;
    border:3px dashed #0078d7;
    border-radius:10px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

#dropZone.dragover{
    background:#e8f3ff;
}

#status{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>DR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">
    Waiting for PDF...
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

dropZone.addEventListener("dragover", function(e){
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function(){
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async function(e){

    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    for(const file of files){

        if(file.type !== "application/pdf"){

            statusDiv.innerHTML +=
            "\n❌ Not a PDF: " + file.name;

            continue;
        }

        await processPDF(file);
    }

});

async function processPDF(file){

    try{

        statusDiv.innerHTML +=
        "\n📄 Reading: " + file.name;

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let text = "";

        for(let page = 1; page <= pdf.numPages; page++){

            const currentPage =
                await pdf.getPage(page);

            const content =
                await currentPage.getTextContent();

            text += content.items
                .map(item => item.str)
                .join(" ");

            text += "\n";
        }

        console.log("PDF TEXT:");
        console.log(text);

        let drNumber = null;

        // Find "DR No" first
        const drMatch =
            text.match(/DR\s*No[\s\S]{0,50}?(\d{10,})/i);

        if(drMatch){
            drNumber = drMatch[1];
        }

        // Fallback: first long number starting with 5
        if(!drNumber){

            const numbers =
                text.match(/\d{10,}/g);

            if(numbers){

                const found =
                    numbers.find(x => x.startsWith("5"));

                if(found){
                    drNumber = found;
                }
            }
        }

        if(!drNumber){

            statusDiv.innerHTML +=
            "\n❌ DR Number Not Found: " +
            file.name;

            statusDiv.innerHTML +=
            "\n\nExtracted Text:\n" +
            text.substring(0,2000);

            return;
        }

        const blob = new Blob(
            [buffer],
            {type:"application/pdf"}
        );

        const url =
            URL.createObjectURL(blob);

        const link =
            document.createElement("a");

        link.href = url;
        link.download = drNumber + ".pdf";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        URL.revokeObjectURL(url);

        statusDiv.innerHTML +=
        "\n✅ Downloaded: " +
        drNumber +
        ".pdf";

    }
    catch(error){

        console.error(error);

        statusDiv.innerHTML +=
        "\n❌ Error: " +
        error.message;
    }
}

</script>

</body>
</html>
