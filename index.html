<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DR PDF Processor</title>

cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:30px;
}

h2{
    text-align:center;
}

#dropZone{
    height:250px;
    border:3px dashed #0078d7;
    border-radius:12px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

#dropZone.dragover{
    background:#e8f3ff;
}

#status{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
}

pre{
    max-height:300px;
    overflow:auto;
    background:#f0f0f0;
    padding:10px;
    border-radius:5px;
    white-space:pre-wrap;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>
<body>

<h2>DR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">
    Waiting for PDF...
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

dropZone.addEventListener("dragover", (e)=>{

    e.preventDefault();
    dropZone.classList.add("dragover");

});

dropZone.addEventListener("dragleave", ()=>{

    dropZone.classList.remove("dragover");

});

dropZone.addEventListener("drop", async (e)=>{

    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    for(const file of files){

        if(file.type !== "application/pdf"){

            statusDiv.innerHTML +=
            "<div class='error'>❌ Not a PDF: "
            + file.name +
            "</div>";

            continue;
        }

        await processPDF(file);

    }

});

async function processPDF(file){

    try{

        statusDiv.innerHTML +=
        "<div>📄 Reading: "
        + file.name +
        "</div>";

        const buffer =
        await file.arrayBuffer();

        const pdf =
        await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let fullText = "";

        for(let page=1; page<=pdf.numPages; page++){

            const currentPage =
            await pdf.getPage(page);

            const content =
            await currentPage.getTextContent();

            const pageText =
            content.items
            .map(item => item.str)
            .join(" ");

            fullText += pageText + "\n";

        }

        console.log(fullText);

        const patterns = [

            /DR\s*No\.?\s*[:\-]?\s*(\d+)/i,
            /DR#\s*(\d+)/i,
            /DR\s*NUMBER\s*[:\-]?\s*(\d+)/i,
            /DELIVERY\s*RECEIPT\s*NO\.?\s*[:\-]?\s*(\d+)/i,
            /\b(5\d{10})\b/,
            /\b(\d{11,})\b/

        ];

        let drNumber = null;

        for(const pattern of patterns){

            const match = fullText.match(pattern);

            if(match){

                drNumber = match[1];
                break;

            }

        }

        if(!drNumber){

            statusDiv.innerHTML +=
            "<div class='error'>❌ DR Number Not Found: "
            + file.name +
            "</div>" +

            "<br><b>Extracted Text:</b>" +

            "<pre>" +
            fullText.replace(/</g,'&lt;') +
            "</pre>";

            return;
        }

        const blob =
        new Blob(
            [buffer],
            {type:"application/pdf"}
        );

        const url =
        URL.createObjectURL(blob);

        const link =
        document.createElement("a");

        link.href =
        url;

        link.download =
        drNumber + ".pdf";

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);

        URL.revokeObjectURL(url);

        statusDiv.innerHTML +=
        "<div class='success'>✅ "
        + file.name +
        " → "
        + drNumber +
        ".pdf</div>";

    }
    catch(error){

        console.error(error);

        statusDiv.innerHTML +=
        "<div class='error'>❌ "
        + file.name +
        " → "
        + error.message +
        "</div>";

    }

}

</script>

</body>
</html>
