<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
    background:#f5f5f5;
}

#dropZone{
    height:250px;
    border:3px dashed #0078d7;
    border-radius:10px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

#dropZone.dragover{
    background:#e8f3ff;
}

#status{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>DR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">
    Waiting for PDF...
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

dropZone.addEventListener("dragover", (e)=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async (e)=>{

    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    for(const file of files){

        if(file.type !== "application/pdf"){
            statusDiv.innerHTML += "\n❌ Not a PDF: " + file.name;
            continue;
        }

        await processPDF(file);
    }
});

async function processPDF(file){

    try{

        statusDiv.innerHTML += "\n📄 Reading: " + file.name;

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let text = "";

        for(let page = 1; page <= pdf.numPages; page++){

            const pdfPage = await pdf.getPage(page);

            const content = await pdfPage.getTextContent();

            text += content.items
                .map(item => item.str)
                .join(" ");

            text += "\n";
        }

        console.log(text);

        let drNumber = null;

        // Main pattern
        let match = text.match(/DR\s*No[\s\S]{0,30}?(\d{10,})/i);

        if(match){
            drNumber = match[1];
        }

        // Fallback for Eagle Cement DRs
        if(!drNumber){

            const allNumbers =
                text.match(/\b\d{10,}\b/g);

            if(allNumbers && allNumbers.length){
                drNumber = allNumbers[0];
            }
        }

        if(!drNumber){

            statusDiv.innerHTML +=
                "\n❌ DR Number Not Found: " + file.name;

            return;
        }

        const blob = new Blob(
            [buffer],
            {type:"application/pdf"}
        );

        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");

        link.href = url;
        link.download = drNumber + ".pdf";

        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        URL.revokeObjectURL(url);

        statusDiv.innerHTML +=
            "\n✅ Downloaded: " + drNumber + ".pdf";

    }
    catch(err){

        console.error(err);

        statusDiv.innerHTML +=
            "\n❌ Error: " + err.message;
    }
}

</script>

</body>
</html>
