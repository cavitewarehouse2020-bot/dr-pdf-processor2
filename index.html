<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DR Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:30px;
}

h2{
    text-align:center;
}

#dropZone{
    height:250px;
    border:3px dashed #0078d7;
    border-radius:12px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

#dropZone.dragover{
    background:#e8f3ff;
}

#status{
    margin-top:20px;
    background:#fff;
    padding:20px;
    border-radius:10px;
    min-height:100px;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<h2>DR Processor</h2>

<div id="dropZone">
    Drag & Drop PDF / JPG / PNG Files Here
</div>

<div id="status">
    Waiting for files...
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

dropZone.addEventListener("dragover", (e)=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async (e)=>{

    e.preventDefault();

    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if(files.length === 0){
        return;
    }

    statusDiv.innerHTML =
        "<b>Processing " + files.length + " file(s)...</b><br><br>";

    for(const file of files){

        if(file.type === "application/pdf"){

            await processPDF(file);

        }else if(
            file.type === "image/jpeg" ||
            file.type === "image/jpg" ||
            file.type === "image/png"
        ){

            await processImage(file);

        }else{

            statusDiv.innerHTML +=
            "<div class='error'>❌ Unsupported File: "
            + file.name +
            "</div>";

        }
    }

});

async function processPDF(file){

    try{

        const buffer = await file.arrayBuffer();

        const pdf =
        await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let fullText = "";

        for(let p=1; p<=pdf.numPages; p++){

            const page =
                await pdf.getPage(p);

            const content =
                await page.getTextContent();

            fullText += content.items
                .map(item => item.str)
                .join(" ");

            fullText += "\n";
        }

        extractDRAndDownload(
            file,
            fullText
        );

    }
    catch(error){

        statusDiv.innerHTML +=
        "<div class='error'>❌ "
        + file.name +
        " → "
        + error.message +
        "</div>";
    }

}

async function processImage(file){

    try{

        statusDiv.innerHTML +=
        "<div>🔍 OCR Reading "
        + file.name +
        "</div>";

        const result =
        await Tesseract.recognize(
            file,
            "eng"
        );

        const text =
        result.data.text;

        extractDRAndDownload(
            file,
            text
        );

    }
    catch(error){

        statusDiv.innerHTML +=
        "<div class='error'>❌ "
        + file.name +
        " → "
        + error.message +
        "</div>";
    }

}

function extractDRAndDownload(file,text){

    console.log(text);

    const match =
    text.match(/DR\s*No\.?\s*[:\-]?\s*(\d+)/i);

    if(!match){

        statusDiv.innerHTML +=
        "<div class='error'>❌ DR Number Not Found: "
        + file.name +
        "</div>";

        return;
    }

    const drNumber = match[1];

    const extension =
    file.name.split('.').pop();

    downloadFile(
        file,
        drNumber + "." + extension
    );

    statusDiv.innerHTML +=
    "<div class='success'>✅ "
    + file.name +
    " → "
    + drNumber +
    "." +
    extension +
    "</div>";

}

function downloadFile(file,newFileName){

    const url =
    URL.createObjectURL(file);

    const link =
    document.createElement("a");

    link.href = url;
    link.download = newFileName;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(url);

}

</script>

</body>
</html>
